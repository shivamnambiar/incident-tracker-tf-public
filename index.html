<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Incident Tracker</title>
  <style>
    body { font-family: sans-serif; max-width: 900px; margin: 40px auto; padding: 0 20px; }
    input, textarea, select { width: 100%; padding: 8px; margin: 4px 0 12px; border: 1px solid #ccc; border-radius: 4px; font-size: 14px; }
    button { padding: 9px 18px; background: #0066cc; color: white; border: none; border-radius: 4px; cursor: pointer; font-size: 14px; }
    button:hover { background: #0055aa; }
    .incident { border: 1px solid #ddd; padding: 12px; margin: 8px 0; border-radius: 6px; }
    .badge { display: inline-block; padding: 2px 8px; border-radius: 10px; font-size: 11px; font-weight: 500; margin-left: 6px; }
    .critical { background: #fee; color: #c00; }
    .high { background: #fff3e0; color: #a34; }
    .medium { background: #fffde7; color: #776; }
    .low { background: #e8f5e9; color: #2a7; }
    .stale { background: #f0f0f0; color: #888; }
    .filters { display: flex; gap: 10px; margin-bottom: 12px; flex-wrap: wrap; }
    .filters select, .filters input { width: auto; margin: 0; }
    .tabs { display: flex; gap: 0; margin-bottom: 20px; border-bottom: 2px solid #ddd; }
    .tab { padding: 10px 20px; cursor: pointer; border: none; background: none; font-size: 14px; color: #666; border-bottom: 2px solid transparent; margin-bottom: -2px; }
    .tab.active { color: #0066cc; border-bottom-color: #0066cc; font-weight: 500; }
    .btn-close { background: #ff9900; font-size: 12px; padding: 4px 10px; margin-top: 8px; margin-right: 6px; }
    .btn-close:hover { background: #cc7a00; }
    .btn-delete { background: #cc0000; font-size: 12px; padding: 4px 10px; margin-top: 8px; }
    .btn-delete:hover { background: #aa0000; }
    .loading { color: #999; font-size: 13px; padding: 12px 0; }
    .session-banner { background: #fff3e0; border: 1px solid #ffcc80; padding: 10px 14px; border-radius: 4px; margin-bottom: 16px; font-size: 13px; color: #a34; display: none; }
  </style>
</head>
<body>

<div id="login-section">
  <h2>Incident Tracker</h2>
  <button id="login-btn">Sign in</button>
</div>

<div id="app-section" style="display:none">
  <h2>Incident Tracker</h2>
  <p id="user-info" style="color:#666; font-size:13px; display:inline;"></p>
  <button id="signout-btn" style="font-size:12px;padding:4px 10px;background:#eee;color:#333;margin-left:12px">Sign out</button>
  <div class="session-banner" id="session-banner">
    Your session has expired. <a href="#" id="signin-again">Sign in again</a>.
  </div>
  <hr style="margin: 12px 0 20px">

  <h3>Create incident</h3>
  <input id="title" placeholder="Title" />
  <textarea id="description" placeholder="Description" rows="3"></textarea>
  <select id="severity">
    <option value="low">Low</option>
    <option value="medium" selected>Medium</option>
    <option value="high">High</option>
    <option value="critical">Critical</option>
  </select>
  <input id="assignedUser" placeholder="Assign to (email)" />
  <button id="create-btn">Create</button>

  <hr style="margin: 24px 0 16px">

  <div class="tabs">
    <button class="tab active" id="tab-mine-btn">My Incidents</button>
    <button class="tab" id="tab-open-btn">All Open Incidents</button>
  </div>

  <div id="tab-mine">
    <div class="filters">
      <select id="filter-status">
        <option value="">All statuses</option>
        <option value="open">Open</option>
        <option value="closed">Closed</option>
        <option value="stale">Stale</option>
      </select>
      <select id="filter-severity">
        <option value="">All severities</option>
        <option value="low">Low</option>
        <option value="medium">Medium</option>
        <option value="high">High</option>
        <option value="critical">Critical</option>
      </select>
      <input id="filter-user" placeholder="Filter by assigned user" style="width:200px;margin:0"/>
      <button id="refresh-mine-btn" style="font-size:12px;padding:4px 10px;background:#eee;color:#333">Refresh</button>
    </div>
    <div id="my-incidents-list"></div>
  </div>

  <div id="tab-open" style="display:none">
    <button id="refresh-open-btn" style="font-size:12px;padding:4px 10px;background:#eee;color:#333;margin-bottom:12px">Refresh</button>
    <div id="open-incidents-list"></div>
  </div>
</div>

<script type="module">
  const API      = '__API_URL__';
  const DOMAIN   = '__COGNITO_DOMAIN__';
  const CLIENT   = '__CLIENT_ID__';
  const REDIRECT = '__CLOUDFRONT_URL__';

  let token = null;
  let allIncidents = [];
  let currentTab = 'mine';

  // ─── PKCE Helpers ────────────────────────────────────────────────

  function generateRandomString(length) {
    const chars = 'ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789-._~';
    let result = '';
    const randomValues = crypto.getRandomValues(new Uint8Array(length));
    randomValues.forEach(v => result += chars[v % chars.length]);
    return result;
  }

  async function generateCodeChallenge(verifier) {
    const encoder = new TextEncoder();
    const data = encoder.encode(verifier);
    const digest = await crypto.subtle.digest('SHA-256', data);
    return btoa(String.fromCharCode(...new Uint8Array(digest)))
      .replace(/\+/g, '-').replace(/\//g, '_').replace(/=/g, '');
  }

  // ─── Token helpers ───────────────────────────────────────────────

  function parseToken(t) {
    return JSON.parse(atob(t.split('.')[1].replace(/-/g,'+').replace(/_/g,'/')));
  }

  function isTokenExpired(t) {
    try {
      const { exp } = parseToken(t);
      return Date.now() >= exp * 1000;
    } catch {
      return true;
    }
  }

  function saveToken(t) {
    sessionStorage.setItem('id_token', t);
  }

  function loadToken() {
    return sessionStorage.getItem('id_token');
  }

  function clearToken() {
    sessionStorage.removeItem('id_token');
    token = null;
  }

  // ─── Auth ────────────────────────────────────────────────────────

  async function login() {
    const codeVerifier = generateRandomString(64);
    const codeChallenge = await generateCodeChallenge(codeVerifier);
    sessionStorage.setItem('code_verifier', codeVerifier);
    location.href = `${DOMAIN}/oauth2/authorize?client_id=${CLIENT}&response_type=code&scope=openid+email&redirect_uri=${REDIRECT}&code_challenge=${codeChallenge}&code_challenge_method=S256`;
  }

  async function exchangeCodeForToken(code) {
    const codeVerifier = sessionStorage.getItem('code_verifier');
    const response = await fetch(`${DOMAIN}/oauth2/token`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
      body: new URLSearchParams({
        grant_type: 'authorization_code',
        client_id: CLIENT,
        redirect_uri: REDIRECT,
        code: code,
        code_verifier: codeVerifier
      })
    });
    const data = await response.json();
    return data.id_token;
  }

  function handleExpiredSession() {
    clearToken();
    document.getElementById('session-banner').style.display = 'block';
  }

  function signOut() {
    clearToken();
    location.href = `${DOMAIN}/logout?client_id=${CLIENT}&logout_uri=${REDIRECT}`;
  }

  // ─── API ─────────────────────────────────────────────────────────

  async function api(path, opts={}) {
    if (!token || isTokenExpired(token)) {
      handleExpiredSession();
      throw new Error('Session expired');
    }
    const res = await fetch(API + path, {
      ...opts,
      headers: { Authorization: `Bearer ${token}`, 'Content-Type': 'application/json' }
    });
    return res.json();
  }

  // ─── Actions ─────────────────────────────────────────────────────

  async function createIncident() {
    const data = await api('/incidents', {
      method: 'POST',
      body: JSON.stringify({
        title: document.getElementById('title').value,
        description: document.getElementById('description').value,
        severity: document.getElementById('severity').value,
        assignedUser: document.getElementById('assignedUser').value,
      })
    });
    alert('Created: ' + (data.incidentId || data.error));
    loadMyIncidents();
  }

  async function closeIncident(id) {
    if (!confirm('Close this incident?')) return;
    await api(`/incidents/${id}`, {
      method: 'PATCH',
      body: JSON.stringify({ status: 'closed' })
    });
    loadMyIncidents();
  }

  async function deleteIncident(id) {
    if (!confirm('Delete this incident?')) return;
    await api(`/incidents/${id}`, { method: 'DELETE' });
    loadMyIncidents();
  }

  async function loadMyIncidents() {
    document.getElementById('my-incidents-list').innerHTML = '<p class="loading">Loading incidents...</p>';
    try {
      const data = await api('/incidents');
      allIncidents = data.incidents || [];
      applyFilters();
    } catch (e) {
      if (e.message !== 'Session expired') {
        document.getElementById('my-incidents-list').innerHTML = '<p style="color:#c00;font-size:13px">Failed to load incidents.</p>';
      }
    }
  }

  async function loadOpenIncidents() {
    document.getElementById('open-incidents-list').innerHTML = '<p class="loading">Loading open incidents...</p>';
    try {
      const data = await api('/incidents/open');
      const list = data.incidents || [];
      document.getElementById('open-incidents-list').innerHTML =
        list.map(i => `
          <div class="incident">
            <strong>${i.title}</strong>
            <span class="badge ${i.severity}">${i.severity}</span>
            <span class="badge" style="background:#f0f0f0;color:#555">${i.status}</span>
            <p style="margin:6px 0;font-size:13px;color:#555">${i.description}</p>
            <small style="color:#999">By: ${i.createdBy||'—'} · Assigned: ${i.assignedUser||'—'} · ${i.createdAt?.slice(0,10)}</small>
          </div>
        `).join('') || '<p style="color:#999;font-size:13px">No open incidents.</p>';
    } catch (e) {
      if (e.message !== 'Session expired') {
        document.getElementById('open-incidents-list').innerHTML = '<p style="color:#c00;font-size:13px">Failed to load incidents.</p>';
      }
    }
  }

  function applyFilters() {
    const status   = document.getElementById('filter-status').value;
    const severity = document.getElementById('filter-severity').value;
    const user     = document.getElementById('filter-user').value.toLowerCase();

    const filtered = allIncidents.filter(i => {
      if (status   && i.status   !== status)                              return false;
      if (severity && i.severity !== severity)                            return false;
      if (user     && !(i.assignedUser||'').toLowerCase().includes(user)) return false;
      return true;
    });

    document.getElementById('my-incidents-list').innerHTML =
      filtered.map(i => `
        <div class="incident">
          <strong>${i.title}</strong>
          <span class="badge ${i.severity}">${i.severity}</span>
          <span class="badge ${i.status === 'stale' ? 'stale' : ''}" style="background:#f0f0f0;color:#555">${i.status}</span>
          <p style="margin:6px 0;font-size:13px;color:#555">${i.description}</p>
          <small style="color:#999">Assigned: ${i.assignedUser||'—'} · ${i.createdAt?.slice(0,10)}</small>
          <br>
          ${i.status === 'open' ? `<button class="btn-close" data-id="${i.incidentId}">Close</button>` : ''}
          <button class="btn-delete" data-id="${i.incidentId}">Delete</button>
        </div>
      `).join('') || '<p style="color:#999;font-size:13px">No incidents match your filters.</p>';

    document.querySelectorAll('.btn-close').forEach(btn => {
      btn.addEventListener('click', () => closeIncident(btn.dataset.id));
    });
    document.querySelectorAll('.btn-delete').forEach(btn => {
      btn.addEventListener('click', () => deleteIncident(btn.dataset.id));
    });
  }

  function switchTab(tab) {
    currentTab = tab;
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    document.getElementById(tab === 'mine' ? 'tab-mine-btn' : 'tab-open-btn').classList.add('active');
    document.getElementById('tab-mine').style.display = tab === 'mine' ? 'block' : 'none';
    document.getElementById('tab-open').style.display = tab === 'open' ? 'block' : 'none';
    if (tab === 'open') loadOpenIncidents();
  }

  // ─── Event Listeners ─────────────────────────────────────────────

  document.getElementById('login-btn').addEventListener('click', login);
  document.getElementById('signin-again').addEventListener('click', login);
  document.getElementById('create-btn').addEventListener('click', createIncident);
  document.getElementById('tab-mine-btn').addEventListener('click', () => switchTab('mine'));
  document.getElementById('tab-open-btn').addEventListener('click', () => switchTab('open'));
  document.getElementById('refresh-mine-btn').addEventListener('click', loadMyIncidents);
  document.getElementById('refresh-open-btn').addEventListener('click', loadOpenIncidents);
  document.getElementById('filter-status').addEventListener('change', applyFilters);
  document.getElementById('filter-severity').addEventListener('change', applyFilters);
  document.getElementById('filter-user').addEventListener('input', applyFilters);
  document.getElementById('signout-btn').addEventListener('click', signOut);

  // ─── Init ────────────────────────────────────────────────────────

  const params = new URLSearchParams(location.search);
  const authCode = params.get('code');

  if (authCode) {
    history.replaceState(null, '', location.pathname);
    token = await exchangeCodeForToken(authCode);
    if (token) saveToken(token);
  } else {
    const saved = loadToken();
    if (saved && !isTokenExpired(saved)) {
      token = saved;
    }
  }

  if (token) {
    document.getElementById('login-section').style.display = 'none';
    document.getElementById('app-section').style.display = 'block';
    const c = parseToken(token);
    document.getElementById('user-info').textContent = 'Signed in as ' + (c.email || c.sub);
    loadMyIncidents();
  }
</script>
</body>
</html>
